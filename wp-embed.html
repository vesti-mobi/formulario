<!--
  ============================================================
  Vesti — Formulário conversacional (snippet para WordPress)
  ============================================================
  Como usar:
    1. No editor de páginas/posts do WordPress, adicione um bloco
       do tipo "HTML personalizado" (Custom HTML).
    2. Cole TODO o conteúdo deste arquivo (do início ao fim).
    3. Publique/atualize a página.

  Observações:
    - O CSS está escopado em .vf-embed para não afetar o tema.
    - O avatar é servido pelo CDN do GitHub (jsdelivr), sem
      precisar de GitHub Pages.
    - Para alterar o webhook, edite o objeto CONFIG no <script>
      abaixo (busque por "webhook:") OU re-gere este arquivo a
      partir de index.html / script.js / style.css.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
.vf-embed {
  --purple-900: #2a0e5c;
  --purple-700: #4a1b9c;
  --purple-500: #6b2fb3;
  --purple-400: #8447c9;
  --green-400:  #3fd9b7;
  --green-500:  #2bc4a1;
  --bubble-bot:        #f3eefb;
  --bubble-bot-text:   #1e1233;
  --bubble-user:       #2a0e5c;
  --bubble-user-text:  #ffffff;
  --text:     #1e1233;
  --muted:    #b8a8d6;
  --error:    #ff6b8a;
  --bg-page:  #f7f4fb;
  --bg-app:   #ffffff;
  --shadow:      0 8px 24px rgba(20, 6, 50, 0.18);
  --shadow-soft: 0 0 40px  rgba(42, 14, 92, 0.06);
  --shadow-input:0 4px 16px rgba(42, 14, 92, 0.10);
  --shadow-btn:  0 4px 14px rgba(42, 14, 92, 0.08);
  --radius:     18px;
  --radius-pill: 999px;
  --focus-ring: 0 0 0 3px rgba(63, 217, 183, 0.55);

  display: flex;
  flex-direction: column;
  height: clamp(560px, 85vh, 780px);
  max-width: 880px;
  margin: 0 auto;
  padding: 0 16px 16px;
  background: var(--bg-app);
  box-shadow: var(--shadow-soft);
  border-radius: 12px;
  overflow: hidden;
  font-family: 'Nunito', system-ui, -apple-system, Segoe UI, sans-serif;
  color: var(--text);
}
.vf-embed, .vf-embed *, .vf-embed *::before, .vf-embed *::after { box-sizing: border-box; }
.vf-embed [hidden] { display: none !important; }

.vf-embed .topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 16px 22px;
  margin: 0 -16px;
  gap: 16px;
  background: linear-gradient(135deg, var(--purple-700) 0%, var(--purple-500) 100%);
  color: #fff;
}
.vf-embed .brand { display: flex; align-items: center; gap: 10px; color: #fff; }
.vf-embed .brand-name { font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }

.vf-embed .progress {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 360px;
  gap: 6px;
}
.vf-embed .dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.7);
  background: transparent;
  transition: background .25s, border-color .25s, transform .25s;
}
.vf-embed .dot.active { background: #fff; border-color: #fff; transform: scale(1.1); }
.vf-embed .dot.done   { background: var(--green-400); border-color: var(--green-400); }
.vf-embed .bar { flex: 1; height: 2px; background: rgba(255,255,255,0.4); border-radius: 2px; }

.vf-embed .chat {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column; gap: 12px;
  padding: 18px 6px;
  overflow-y: auto; scroll-behavior: smooth;
}
.vf-embed .chat > .row:first-child { margin-top: auto; }

.vf-embed .row { display: flex; align-items: flex-end; gap: 10px; animation: vfe-pop .32s ease-out; }
.vf-embed .row.bot  { justify-content: flex-start; }
.vf-embed .row.user { justify-content: flex-end; }

.vf-embed .avatar {
  flex-shrink: 0; width: 36px; height: 36px;
  border-radius: 50%; background: var(--green-400); color: var(--purple-900);
  display: grid; place-items: center;
  font-weight: 800; font-size: 14px;
  box-shadow: var(--shadow); overflow: hidden;
}
.vf-embed .avatar img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: 50% 26%;
  transform: scale(2.5); transform-origin: 50% 26%;
  display: block;
}

.vf-embed .bubble {
  max-width: 78%;
  padding: 14px 18px;
  border-radius: var(--radius);
  font-size: 16px; line-height: 1.45;
  box-shadow: var(--shadow);
  word-wrap: break-word;
}
.vf-embed .row.bot  .bubble { background: var(--bubble-bot);  color: var(--bubble-bot-text);  border-bottom-left-radius: 4px; }
.vf-embed .row.user .bubble { background: var(--bubble-user); color: var(--bubble-user-text); border-bottom-right-radius: 4px; }
.vf-embed .bubble a { color: inherit; text-decoration: underline; }

.vf-embed .typing { display: inline-flex; gap: 4px; align-items: center; }
.vf-embed .typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--purple-400);
  animation: vfe-blink 1.2s infinite ease-in-out;
}
.vf-embed .typing span:nth-child(2) { animation-delay: .2s; }
.vf-embed .typing span:nth-child(3) { animation-delay: .4s; }
@keyframes vfe-blink { 0%,80%,100% { opacity:.3; transform: translateY(0); } 40% { opacity:1; transform: translateY(-3px); } }
@keyframes vfe-pop   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.vf-embed .composer { background: transparent; padding: 8px 4px 4px; display: flex; flex-direction: column; gap: 6px; }
.vf-embed .field-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--purple-500); text-align: center; text-transform: uppercase; margin-bottom: 4px; }

.vf-embed .input-wrap {
  display: flex; align-items: center;
  background: #fff; border-radius: var(--radius-pill);
  padding: 6px 6px 6px 22px;
  box-shadow: var(--shadow-input);
  border: 2px solid #ece5f5;
  transition: border-color .2s;
}
.vf-embed .input-wrap:focus-within { border-color: var(--green-400); }
.vf-embed .prefix { font-weight: 700; color: var(--purple-700); margin-right: 10px; white-space: nowrap; }
.vf-embed .vfe-input {
  flex: 1; border: 0; outline: 0;
  background: transparent; font-size: 17px;
  font-family: inherit; color: var(--text);
  padding: 12px 4px;
}
.vf-embed .vfe-input::placeholder { color: #b3a8c8; }

.vf-embed .send {
  flex-shrink: 0; width: 44px; height: 44px;
  border-radius: 50%; border: 0;
  background: var(--green-400); color: var(--purple-900);
  display: grid; place-items: center;
  cursor: pointer; transition: background .2s, transform .15s;
}
.vf-embed .send:hover    { background: var(--green-500); }
.vf-embed .send:active   { transform: scale(0.94); }
.vf-embed .send:disabled { background: #d4cfe0; color: #fff; cursor: not-allowed; }
.vf-embed .send svg      { width: 22px; height: 22px; }

.vf-embed .choices { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
.vf-embed .chat > .choices.in-chat { animation: vfe-pop .32s ease-out; }
.vf-embed .choice-btn {
  width: 100%; padding: 14px 18px;
  border-radius: var(--radius-pill);
  border: 2px solid var(--green-400);
  background: #fff; color: var(--purple-700);
  font-family: inherit; font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: background .15s, color .15s, transform .1s;
  box-shadow: var(--shadow-btn);
}
.vf-embed .choice-btn:hover  { background: var(--green-400); color: var(--purple-900); }
.vf-embed .choice-btn:active { transform: scale(0.98); }

.vf-embed .error { min-height: 18px; margin: 4px 0 0; font-size: 13px; color: var(--error); text-align: center; font-weight: 600; }
.vf-embed .terms { margin: 6px 0 0; text-align: center; font-size: 12px; color: #7b6b9a; }
.vf-embed .terms a { color: var(--purple-700); text-decoration: underline; }

.vf-embed .done-state { text-align: center; padding: 40px 16px; color: var(--text); }
.vf-embed .done-state h2 { margin: 0 0 8px; font-size: 26px; font-weight: 800; }
.vf-embed .done-state p { margin: 0; opacity: .9; }
.vf-embed .done-state .check {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--green-400);
  display: grid; place-items: center;
  margin: 0 auto 16px; box-shadow: var(--shadow);
}
.vf-embed .done-state .check svg { width: 32px; height: 32px; color: var(--purple-900); }

.vf-embed :focus { outline: none; }
.vf-embed :focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: 6px; }
.vf-embed .send:focus-visible, .vf-embed .choice-btn:focus-visible { box-shadow: var(--focus-ring), var(--shadow-btn); }
.vf-embed .input-wrap:focus-within { box-shadow: var(--focus-ring), var(--shadow-input); }

@media (max-width: 540px) {
  .vf-embed .bubble     { max-width: 84%; font-size: 15px; padding: 12px 16px; }
  .vf-embed .brand-name { display: none; }
  .vf-embed .vfe-input  { font-size: 16px; }
  .vf-embed .topbar     { padding: 14px 4px 18px; }
}
</style>

<div class="vf-embed" data-vf-root>
  <header class="topbar">
    <div class="brand"><span class="brand-name">Vesti</span></div>
    <div class="progress" role="progressbar" aria-label="Progresso do formulário" aria-valuemin="0" aria-valuemax="4" aria-valuenow="0">
      <span class="dot active"></span><span class="bar"></span>
      <span class="dot"></span><span class="bar"></span>
      <span class="dot"></span><span class="bar"></span>
      <span class="dot"></span>
    </div>
  </header>

  <section class="chat" data-vf="chat" role="log" aria-live="polite" aria-label="Conversa com o atendente"></section>

  <form class="composer" data-vf="composer" autocomplete="off" novalidate>
    <label class="field-label" data-vf="fieldLabel">NOME COMPLETO</label>
    <div class="input-wrap" data-vf="inputWrap">
      <span class="prefix" data-vf="prefix" hidden></span>
      <input class="vfe-input" data-vf="input" name="answer" type="text" placeholder="Digite seu nome e sobrenome..." autocomplete="off" required>
      <button class="send" type="submit" aria-label="Enviar resposta">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="choices" data-vf="choices" role="group" aria-label="Opções de resposta" hidden></div>
    <p class="error" data-vf="error" role="alert" aria-live="assertive"></p>
    <p class="terms">Ao continuar, você concorda com a <a href="#" target="_blank" rel="noopener">Política de Privacidade</a> e o <a href="#" target="_blank" rel="noopener">Termo de Consentimento</a>.</p>
  </form>
</div>

<script>
(function () {
  // Localiza o container deste snippet específico.
  var script = document.currentScript;
  var root = script && script.previousElementSibling;
  while (root && !(root.classList && root.classList.contains('vf-embed'))) {
    root = root.previousElementSibling;
  }
  if (!root) return;

  var CONFIG = {
    webhook: {
      production: 'https://marketing.oraculo.moda/webhook/a5eca436-375e-4d22-9bac-7ade2048944a',
      test:       'https://marketing.oraculo.moda/webhook-test/a5eca436-375e-4d22-9bac-7ade2048944a',
      active: 'production'
    },
    avatarUrl: 'https://cdn.jsdelivr.net/gh/vesti-mobi/formulario@main/avatar.jpg',
    timing: { intro: 600, question: 750, finalTitle: 600, focus: 100 },
    intro: [],
    steps: [
      { key: 'nome', botMessage: 'Olá! Para começar, me conta seu nome completo?', label: 'NOME COMPLETO',
        placeholder: 'Digite seu nome e sobrenome...', type: 'text',
        validate: function (v) { return v.trim().length < 2 ? 'Digite seu nome.' : null; },
        format:   function (v) { return v.trim().replace(/\s+/g, ' '); } },
      { key: 'whatsapp',
        botMessage: function (d) { return 'Prazer, ' + firstName(d.nome) + '! Qual seu WhatsApp?'; },
        label: 'WHATSAPP', placeholder: '(11) 99999-9999',
        type: 'tel', prefix: 'BR +55', mask: 'phoneBR',
        validate: function (v) { var d = v.replace(/\D/g, ''); return (d.length < 10 || d.length > 11) ? 'Telefone inválido. Use DDD + número.' : null; },
        format:   function (v) { return v.replace(/\D/g, ''); } },
      { key: 'perfil',
        botMessage: function (d) { return firstName(d.nome) + ', para direcionar seu atendimento da melhor forma, me conta, você é:'; },
        label: 'PERFIL', type: 'choice',
        options: [
          { value: 'fabricante',    label: 'Fabricante' },
          { value: 'multimarca',    label: 'Multimarca' },
          { value: 'cliente_vesti', label: 'Já sou cliente da Vesti' }
        ]
      },
      { key: 'marca', botMessage: 'Qual o nome da sua marca?', label: 'NOME DA MARCA',
        placeholder: 'Digite o nome da sua marca...', type: 'text',
        condition: function (d) { return d.perfil === 'fabricante' || d.perfil === 'cliente_vesti'; },
        validate:  function (v) { return v.trim().length < 2 ? 'Informe o nome da marca.' : null; },
        format:    function (v) { return v.trim(); } },
      { key: 'cliente_busca', botMessage: 'O que está buscando?', label: 'BUSCA', type: 'choice',
        condition: function (d) { return d.perfil === 'cliente_vesti'; },
        options: [
          { value: 'btn_suporte', label: 'Suporte' },
          { value: 'btn_cs',      label: 'Conhecer outro produto' }
        ]
      },
      { key: 'usa_erp', botMessage: 'Você utiliza algum ERP atualmente?', label: 'ERP', type: 'choice',
        condition: function (d) { return d.perfil === 'fabricante'; },
        options: [ { value: 'sim', label: 'Sim' }, { value: 'nao', label: 'Não' } ]
      },
      { key: 'erp_nome', botMessage: 'Qual ERP você utiliza?', label: 'NOME DO ERP',
        placeholder: 'Ex: Bling, Tiny, Linx...', type: 'text',
        condition: function (d) { return d.usa_erp === 'sim'; },
        validate:  function (v) { return v.trim().length < 2 ? 'Informe o nome do ERP.' : null; },
        format:    function (v) { return v.trim(); } },
      { key: 'faturamento', botMessage: 'Por último, qual a faixa de faturamento mensal?', label: 'FAIXA DE FATURAMENTO', type: 'choice',
        condition: function (d) { return d.perfil === 'fabricante'; },
        options: [
          { value: 'btn_starter',    label: 'Até R$ 200k' },
          { value: 'btn_pro',        label: 'R$ 200k - R$ 1M' },
          { value: 'btn_enterprise', label: 'Acima de R$ 1M' }
        ]
      }
    ],
    finalMessage: { title: 'Obrigada pelas informações!', body: 'Vamos te chamar no WhatsApp em breve.' },
    multimarcaMessage: 'A Vesti é focada no atacado de moda, conectando fabricantes e revendedores diretamente, por isso não atendemos o modelo multimarca.\n\nMas se quiser conhecer os fornecedores que usam a Vesti, vale baixar o Vestishop, nosso app com o catálogo completo das confecções parceiras: https://vestishop.vesti.mobi/app',
    clienteCSMessage: function (d) { return 'Obrigada, ' + firstName(d.nome) + '! A consultora responsável pela sua marca entrará em contato em breve.'; },
    clienteSuporteMessage: 'Clique abaixo para falar com nosso time de suporte:\n\n📲 wa.me/551132304077\n\nAtendemos de Seg. a Sex. (8h30 às 17h30) e Sáb. (9h às 13h).'
  };

  var state = { stepIndex: 0, data: {}, busy: false };

  function $(sel) { return root.querySelector('[data-vf="' + sel + '"]'); }
  function getActiveWebhookUrl() { return CONFIG.webhook[CONFIG.webhook.active] || CONFIG.webhook.production; }
  function firstName(full) { return (full || '').trim().split(/\s+/)[0] || ''; }
  function scrollChatToBottom() { var c = $('chat'); c.scrollTop = c.scrollHeight; }

  function getUtmsAndClickIds() {
    var params = new URLSearchParams(window.location.search);
    var keys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','fbclid'];
    var out = {};
    keys.forEach(function (k) { var v = params.get(k); if (v) out[k] = v; });
    return out;
  }
  function applyPhoneMaskBR(value) {
    var d = value.replace(/\D/g, '').slice(0, 11);
    if (d.length === 0)  return '';
    if (d.length <= 2)   return '(' + d;
    if (d.length <= 6)   return '(' + d.slice(0,2) + ') ' + d.slice(2);
    if (d.length <= 10)  return '(' + d.slice(0,2) + ') ' + d.slice(2,6) + '-' + d.slice(6);
    return '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7,11);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }
  function formatBubbleText(text) {
    var escaped = escapeHtml(text);
    var linkified = escaped.replace(/(https?:\/\/[^\s<]+|wa\.me\/[^\s<]+)/g, function (m) {
      var href = m.indexOf('http') === 0 ? m : 'https://' + m;
      return '<a href="' + href + '" target="_blank" rel="noopener">' + m + '</a>';
    });
    return linkified.replace(/\n/g, '<br>');
  }

  function appendBubble(side, text) {
    var row = document.createElement('div');
    row.className = 'row ' + side;
    if (side === 'bot') {
      row.innerHTML =
        '<div class="avatar" aria-hidden="true"><img src="' + CONFIG.avatarUrl + '" alt=""/></div>' +
        '<div class="bubble">' + formatBubbleText(text) + '</div>';
    } else {
      row.innerHTML = '<div class="bubble">' + formatBubbleText(text) + '</div>';
    }
    $('chat').appendChild(row);
    scrollChatToBottom();
  }
  function showTyping() {
    var row = document.createElement('div');
    row.className = 'row bot';
    row.setAttribute('data-vf-typing', '1');
    row.innerHTML =
      '<div class="avatar" aria-hidden="true"><img src="' + CONFIG.avatarUrl + '" alt=""/></div>' +
      '<div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>';
    $('chat').appendChild(row);
    scrollChatToBottom();
  }
  function hideTyping() {
    var t = root.querySelector('[data-vf-typing]');
    if (t) t.remove();
  }
  function botSay(text, delay) {
    delay = (typeof delay === 'number') ? delay : CONFIG.timing.question;
    return new Promise(function (resolve) {
      showTyping();
      setTimeout(function () { hideTyping(); appendBubble('bot', text); resolve(); }, delay);
    });
  }

  function getVisibleSteps() {
    return CONFIG.steps.filter(function (s) { return !s.condition || s.condition(state.data); });
  }
  function updateProgress() {
    var visible = getVisibleSteps();
    var currentKey = CONFIG.steps[state.stepIndex] && CONFIG.steps[state.stepIndex].key;
    var currentVisibleIndex = visible.findIndex(function (s) { return s.key === currentKey; });

    var progress = root.querySelector('.progress');
    progress.innerHTML = '';
    visible.forEach(function (_, i) {
      if (i > 0) {
        var bar = document.createElement('span'); bar.className = 'bar'; progress.appendChild(bar);
      }
      var dot = document.createElement('span'); dot.className = 'dot';
      if (currentVisibleIndex === -1)               dot.classList.add('done');
      else if (i <  currentVisibleIndex)            dot.classList.add('done');
      else if (i === currentVisibleIndex)           dot.classList.add('active');
      progress.appendChild(dot);
    });
    progress.setAttribute('aria-valuemax', String(visible.length));
    progress.setAttribute('aria-valuenow', String(Math.max(0, currentVisibleIndex)));
  }

  function renderInputForCurrentStep() {
    var step      = CONFIG.steps[state.stepIndex];
    var composer  = $('composer');
    var input     = $('input');
    var label     = $('fieldLabel');
    var prefix    = $('prefix');
    var inputWrap = $('inputWrap');

    $('error').textContent = '';

    // Escolha múltipla: os botões vão para DENTRO do chat (parte da conversa),
    // e a barra de entrada some. Assim, no mobile, a pergunta nunca fica
    // coberta — tudo está no mesmo container que rola.
    if (step.type === 'choice') {
      composer.hidden = true;
      appendChoices(step);
      return;
    }

    composer.hidden = false;
    inputWrap.hidden = false;
    label.textContent = step.label;
    input.value = '';
    input.type = step.type || 'text';
    input.placeholder = step.placeholder || '';
    input.inputMode = step.type === 'tel' ? 'numeric' : step.type === 'email' ? 'email' : 'text';

    if (step.prefix) { prefix.textContent = step.prefix; prefix.hidden = false; }
    else             { prefix.hidden = true; prefix.textContent = ''; }

    setTimeout(function () { input.focus(); }, CONFIG.timing.focus);
  }

  // Adiciona os botões de escolha como um bloco dentro do chat.
  function appendChoices(step) {
    var group = document.createElement('div');
    group.className = 'choices in-chat';
    group.setAttribute('role', 'group');
    group.setAttribute('aria-label', 'Opções de resposta');
    step.options.forEach(function (opt) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'choice-btn';
      btn.textContent = opt.label;
      btn.addEventListener('click', function () { onChoiceSelect(opt, group); });
      group.appendChild(btn);
    });
    $('chat').appendChild(group);
    scrollChatToBottom();
  }

  function onChoiceSelect(opt, group) {
    if (state.busy) return;
    var step = CONFIG.steps[state.stepIndex];
    state.data[step.key] = opt.value;
    if (group) group.remove();        // remove os botões do chat
    appendBubble('user', opt.label);  // a escolha vira a resposta do usuário
    nextStep();
  }

  async function nextStep() {
    state.busy = true;
    state.stepIndex += 1;
    while (state.stepIndex < CONFIG.steps.length) {
      var s = CONFIG.steps[state.stepIndex];
      if (s.condition && !s.condition(state.data)) state.stepIndex += 1;
      else break;
    }
    updateProgress();

    if (state.stepIndex >= CONFIG.steps.length) {
      await finish();
      state.busy = false;
      return;
    }

    var step = CONFIG.steps[state.stepIndex];
    var msg  = (typeof step.botMessage === 'function') ? step.botMessage(state.data) : step.botMessage;
    await botSay(msg, CONFIG.timing.question);
    renderInputForCurrentStep();
    state.busy = false;
  }

  // Envio ao webhook (reutilizável). `extra` acrescenta campos ao payload
  // (ex.: { status: 'parcial' } / { status: 'completo' }).
  async function sendToWebhook(extra) {
    var payload = Object.assign({}, state.data, getUtmsAndClickIds(), extra || {}, {
      submitted_at: new Date().toISOString(),
      page_url:     window.location.href,
      user_agent:   navigator.userAgent,
      referrer:     document.referrer || null
    });
    try {
      await fetch(getActiveWebhookUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (err) {
      console.error('[Vesti Form] Erro ao enviar para o webhook:', err);
    }
  }

  async function finish() {
    $('composer').remove();

    var isMultimarca     = state.data.perfil === 'multimarca';
    var isClienteCS      = state.data.perfil === 'cliente_vesti' && state.data.cliente_busca === 'btn_cs';
    var isClienteSuporte = state.data.perfil === 'cliente_vesti' && state.data.cliente_busca === 'btn_suporte';

    if (isMultimarca)          await botSay(CONFIG.multimarcaMessage,            CONFIG.timing.finalTitle);
    else if (isClienteCS)      await botSay(CONFIG.clienteCSMessage(state.data), CONFIG.timing.finalTitle);
    else if (isClienteSuporte) await botSay(CONFIG.clienteSuporteMessage,        CONFIG.timing.finalTitle);
    // Fabricante: não enviamos balão do bot — só o cartão final abaixo,
    // para o título não aparecer duplicado.

    // Disparo final (qualificação concluída).
    await sendToWebhook({ status: 'completo' });

    if (isMultimarca || isClienteCS || isClienteSuporte) return;

    // Pausa com indicador de digitação antes de exibir o cartão final.
    showTyping();
    await new Promise(function (r) { setTimeout(r, CONFIG.timing.finalTitle); });
    hideTyping();

    var done = document.createElement('div');
    done.className = 'done-state';
    done.innerHTML =
      '<div class="check"><svg viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M5 12l5 5L20 7" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg></div>' +
      '<h2>' + escapeHtml(CONFIG.finalMessage.title) + '</h2>' +
      '<p>' + escapeHtml(CONFIG.finalMessage.body) + '</p>';
    root.appendChild(done);
  }

  function onSubmit(e) {
    e.preventDefault();
    if (state.busy) return;
    var step = CONFIG.steps[state.stepIndex];
    if (!step || step.type === 'choice') return;
    var raw = $('input').value;
    var err = step.validate ? step.validate(raw) : null;
    if (err) { $('error').textContent = err; return; }
    var value = step.format ? step.format(raw) : raw.trim();
    state.data[step.key] = value;
    var displayValue = step.mask === 'phoneBR' ? applyPhoneMaskBR(value) : raw.trim();
    appendBubble('user', displayValue);
    $('input').value = '';
    // Disparo de contato: assim que o lead informa o WhatsApp (2ª pergunta),
    // enviamos nome + telefone para capturar o lead imediatamente, mesmo que
    // ele abandone o formulário antes de concluir. Fire-and-forget.
    if (step.key === 'whatsapp') {
      sendToWebhook({ status: 'contato' });
    }
    // Disparo parcial: assim que o FABRICANTE informa a marca, enviamos o
    // lead qualificado por perfil (sem faixa). Fire-and-forget.
    if (step.key === 'marca' && state.data.perfil === 'fabricante') {
      sendToWebhook({ status: 'parcial' });
    }
    nextStep();
  }
  function onInput(e) {
    var step = CONFIG.steps[state.stepIndex];
    if (step && step.mask === 'phoneBR') {
      var masked = applyPhoneMaskBR(e.target.value);
      if (masked !== e.target.value) e.target.value = masked;
    }
    $('error').textContent = '';
  }

  async function init() {
    updateProgress();
    for (var i = 0; i < CONFIG.intro.length; i++) {
      await botSay(CONFIG.intro[i], CONFIG.timing.intro);
    }
    var first = CONFIG.steps[0];
    var firstMsg = (typeof first.botMessage === 'function') ? first.botMessage(state.data) : first.botMessage;
    await botSay(firstMsg, CONFIG.timing.question);
    renderInputForCurrentStep();
  }

  $('composer').addEventListener('submit', onSubmit);
  $('input').addEventListener('input', onInput);
  init();
})();
</script>
